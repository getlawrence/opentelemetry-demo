# DataDog Java Agent Configuration for Ad Service
# Copyright The OpenTelemetry Authors
# SPDX-License-Identifier: Apache-2.0

# Service configuration
dd.service=ad
dd.env=development
dd.version=latest

# Agent configuration
dd.agent.host=datadog-agent
dd.agent.port=8126

# Tracing configuration
dd.trace.enabled=true
dd.trace.analytics.enabled=true
dd.trace.sample.rate=1.0

# Logging configuration
dd.logs.injection=true
dd.logs.enabled=true

# Runtime metrics
dd.jmxfetch.enabled=true
dd.jmxfetch.config.dir=/app/datadog

# Custom tags
dd.tags=service:ad,env:development,version:latest

# gRPC instrumentation
dd.integration.grpc.enabled=true
dd.integration.grpc.analytics.enabled=true

# Log4j integration
dd.integration.log4j.enabled=true
dd.integration.log4j.analytics.enabled=true
